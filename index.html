<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 3D Pro - Renderizador</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #000000; 
  font-family: Arial, sans-serif;
  overflow: hidden;
}
canvas { display: block; }
#ui {
  position: fixed;
  bottom: 30px;
  left: 30px;
  background: rgba(0,0,0,0.8);
  color: #FFF;
  padding: 20px;
  border-radius: 10px;
  font-size: 12px;
  border: 2px solid #FF7A00;
  z-index: 100;
}
#screenshot {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #FF7A00;
  color: #000;
  padding: 15px 30px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  z-index: 100;
  transition: all 0.3s;
}
#screenshot:hover { background: #FF9D00; transform: scale(1.05); }
#info {
  font-size: 11px;
  margin-top: 10px;
  color: #FFA500;
}
</style>
</head>
<body>
<div id="ui">
  🔄 Renderizando Logotipo 3D Premium<br>
  <div id="info">Qualidade Ultra • Ray Tracing Simulado</div>
</div>
<button id="screenshot">📸 EXPORTAR PNG</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ===== CONFIGURAÇÕES =====
const CANVAS_WIDTH = window.innerWidth;
const CANVAS_HEIGHT = window.innerHeight;

// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.Fog(0x000000, 100, 500);

// ===== CÂMERA =====
const camera = new THREE.PerspectiveCamera(
  75,
  CANVAS_WIDTH / CANVAS_HEIGHT,
  0.1,
  1000
);
camera.position.set(0, 0.3, 3.2);

// ===== RENDERER =====
const canvas = document.createElement('canvas');
const renderer = new THREE.WebGLRenderer({ 
  canvas, 
  antialias: true, 
  alpha: true,
  precision: 'highp',
  powerPreference: 'high-performance'
});
renderer.setSize(CANVAS_WIDTH, CANVAS_HEIGHT);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowShadowShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(canvas);

// ===== MATERIAIS =====

// Material Preto Brilhante (Piano Black Glass)
const blackMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x0a0a0a,
  metalness: 0,
  roughness: 0.05,
  clearcoat: 1.0,
  clearcoatRoughness: 0.02,
  ior: 1.5,
  envMapIntensity: 2.0,
  side: THREE.FrontSide
});

// Material Laranja Metálico
const orangeMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xFF7A00,
  metalness: 0.85,
  roughness: 0.12,
  ior: 2.4,
  specularIntensity: 0.7,
  envMapIntensity: 1.8
});

// Material Neon Laranja (Emissivo)
const neonMaterial = new THREE.MeshBasicMaterial({
  color: 0xFF6A00,
  emissive: 0xFF6A00,
  emissiveIntensity: 1.5
});

// ===== GEOMETRIAS E MESHES =====

// 1. CONTAINER PRETO PRINCIPAL
const containerGeometry = new THREE.BoxGeometry(2.2, 2.2, 0.35);
const container = new THREE.Mesh(containerGeometry, blackMaterial);
container.castShadow = true;
container.receiveShadow = true;
scene.add(container);

// Aplicar bevel às arestas (através de LineSegments)
const edgesGeometry = new THREE.EdgesGeometry(containerGeometry, 20);
const wireframe = new THREE.LineSegments(
  edgesGeometry,
  new THREE.LineBasicMaterial({ color: 0xFF8A00, linewidth: 2, fog: false })
);
container.add(wireframe);

// 2. BORDA NEON LUMINOSA
const neonBorderGeometry = new THREE.BoxGeometry(2.25, 2.25, 0.37);
const neonBorder = new THREE.Mesh(neonBorderGeometry, neonMaterial);
neonBorder.position.z = -0.01;
neonBorder.castShadow = false;
neonBorder.receiveShadow = false;
scene.add(neonBorder);

// 3. SÍMBOLO LARANJA 3D (GRUPO PRINCIPAL)
const symbolGroup = new THREE.Group();
symbolGroup.position.z = 0.25;

// --- Banda Central (Cone estilizado) ---
const centralCone = new THREE.ConeGeometry(0.18, 1.6, 32);
const centralSymbol = new THREE.Mesh(centralCone, orangeMaterial);
centralSymbol.position.y = -0.1;
centralSymbol.castShadow = true;
centralSymbol.receiveShadow = true;
symbolGroup.add(centralSymbol);

// --- Esfera Esquerda Superior ---
const sphereLeft = new THREE.SphereGeometry(0.28, 32, 32);
const sphereLeftMesh = new THREE.Mesh(sphereLeft, orangeMaterial);
sphereLeftMesh.position.set(-0.55, 0.45, 0);
sphereLeftMesh.castShadow = true;
sphereLeftMesh.receiveShadow = true;
symbolGroup.add(sphereLeftMesh);

// --- Esfera Direita Superior ---
const sphereRight = new THREE.SphereGeometry(0.28, 32, 32);
const sphereRightMesh = new THREE.Mesh(sphereRight, orangeMaterial);
sphereRightMesh.position.set(0.55, 0.45, 0);
sphereRightMesh.castShadow = true;
sphereRightMesh.receiveShadow = true;
symbolGroup.add(sphereRightMesh);

// --- Pés Inferiores ---
const footLeft = new THREE.ConeGeometry(0.15, 0.6, 16);
const footLeftMesh = new THREE.Mesh(footLeft, orangeMaterial);
footLeftMesh.position.set(-0.45, -0.75, 0);
footLeftMesh.rotation.z = Math.PI / 6;
footLeftMesh.castShadow = true;
footLeftMesh.receiveShadow = true;
symbolGroup.add(footLeftMesh);

const footRight = new THREE.ConeGeometry(0.15, 0.6, 16);
const footRightMesh = new THREE.Mesh(footRight, orangeMaterial);
footRightMesh.position.set(0.45, -0.75, 0);
footRightMesh.rotation.z = -Math.PI / 6;
footRightMesh.castShadow = true;
footRightMesh.receiveShadow = true;
symbolGroup.add(footRightMesh);

scene.add(symbolGroup);

// ===== ILUMINAÇÃO PROFISSIONAL =====

// Key Light (Superior Esquerda) - 1000W
const keyLight = new THREE.DirectionalLight(0xFFFFFF, 1.3);
keyLight.position.set(-3, 4, 3);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.left = -5;
keyLight.shadow.camera.right = 5;
keyLight.shadow.camera.top = 5;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.camera.far = 20;
scene.add(keyLight);

// Fill Light (Frente) - 300W
const fillLight = new THREE.DirectionalLight(0xFFFFFF, 0.5);
fillLight.position.set(0, 1, 4);
scene.add(fillLight);

// Rim Light (Traseira Direita) - 500W
const rimLight = new THREE.DirectionalLight(0xFF7A00, 0.4);
rimLight.position.set(3, 1, -3);
scene.add(rimLight);

// Ambient Light (ambiente geral)
const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.35);
scene.add(ambientLight);

// Light auxiliar para reflexos
const auxLight = new THREE.PointLight(0xFF7A00, 0.3);
auxLight.position.set(-2, -2, 2);
scene.add(auxLight);

// ===== PLANO DE REFERÊNCIA (para sombras) =====
const planeGeometry = new THREE.PlaneGeometry(20, 20);
const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.1 });
const plane = new THREE.Mesh(planeGeometry, planeMaterial);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -2;
plane.receiveShadow = true;
scene.add(plane);

// ===== CONTROLES DO MOUSE =====
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let autoRotate = true;

document.addEventListener('mousedown', (e) => {
  isDragging = true;
  autoRotate = false;
  previousMousePosition = { x: e.clientX, y: e.clientY };
});

document.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    
    symbolGroup.rotation.y += deltaX * 0.008;
    symbolGroup.rotation.x += deltaY * 0.008;
    container.rotation.y += deltaX * 0.008;
    container.rotation.x += deltaY * 0.008;
    
    previousMousePosition = { x: e.clientX, y: e.clientY };
  }
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  autoRotate = true;
});

// ===== SCREENSHOT/EXPORT =====
document.getElementById('screenshot').addEventListener('click', () => {
  renderer.render(scene, camera);
  
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'logo_3d_final.png';
  link.click();
  
  alert('✅ Imagem salva como: logo_3d_final.png');
});

// ===== ANIMAÇÃO PRINCIPAL =====
function animate() {
  requestAnimationFrame(animate);
  
  // Rotação automática suave
  if (autoRotate) {
    symbolGroup.rotation.y += 0.0015;
    container.rotation.y += 0.0015;
  }
  
  // Renderização
  renderer.render(scene, camera);
}

animate();

// ===== RESIZE HANDLING =====
window.addEventListener('resize', () => {
  const newWidth = window.innerWidth;
  const newHeight = window.innerHeight;
  
  camera.aspect = newWidth / newHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(newWidth, newHeight);
});

// Log de sucesso
console.log('✅ Renderizador 3D Premium Carregado com Sucesso!');
console.log('📸 Clique no botão EXPORTAR PNG para salvar a imagem');

</script>
</body>
</html>
